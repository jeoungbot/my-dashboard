<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🚢 내 공모전·인턴십 대시보드</title>
  <style>
    /* ===== 테마 변수 ===== */
    :root {
      --bg: #f0f4f8; --surface: #fff; --surface2: #f8fafc;
      --text: #1a202c; --sub: #64748b; --border: #e2e8f0;
      --accent: #2563eb; --accent-h: #1d4ed8; --ship: #0f4c81;
      --r: 14px; --rs: 9px;
      --sh: 0 1px 3px rgba(0,0,0,.08); --sh-lg: 0 10px 30px rgba(0,0,0,.12);
    }
    [data-theme="dark"] {
      --bg: #0f172a; --surface: #1e293b; --surface2: #0f172a;
      --text: #f1f5f9; --sub: #94a3b8; --border: #334155;
      --accent: #3b82f6; --accent-h: #2563eb; --ship: #60a5fa;
      --sh: 0 1px 3px rgba(0,0,0,.3); --sh-lg: 0 10px 30px rgba(0,0,0,.4);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo',
                   'Noto Sans KR', sans-serif;
      background: var(--bg); color: var(--text);
      line-height: 1.55; transition: background .3s, color .3s;
    }
    button { font-family: inherit; cursor: pointer; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ===== 헤더 ===== */
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 200; box-shadow: var(--sh);
    }
    .hdr {
      max-width: 1440px; margin: 0 auto; padding: 0 24px;
      height: 62px; display: flex; align-items: center; gap: 14px;
    }
    .logo {
      display: flex; align-items: center; gap: 9px;
      font-size: 19px; font-weight: 800; color: var(--ship);
      flex-shrink: 0; letter-spacing: -.3px;
    }
    .logo-em { font-size: 26px; }
    .sw { flex: 1; max-width: 480px; position: relative; }
    .sw input {
      width: 100%; padding: 9px 14px 9px 40px;
      border: 1.5px solid var(--border); border-radius: 50px;
      background: var(--surface2); color: var(--text);
      font-size: 14px; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .sw input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    .sw input::placeholder { color: var(--sub); }
    .sw-ico { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 15px; pointer-events: none; }
    .hdr-r { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .btn-ico {
      width: 38px; height: 38px; border-radius: 50%;
      border: 1.5px solid var(--border); background: var(--surface);
      color: var(--text); display: flex; align-items: center; justify-content: center;
      font-size: 17px; transition: background .2s, border-color .2s;
    }
    .btn-ico:hover { background: var(--bg); border-color: var(--accent); }
    .btn-add {
      padding: 9px 18px; background: var(--accent); color: #fff;
      border: none; border-radius: 50px; font-size: 14px; font-weight: 700;
      display: flex; align-items: center; gap: 5px;
      box-shadow: 0 2px 8px rgba(37,99,235,.35);
      transition: background .2s, transform .15s;
      white-space: nowrap;
    }
    .btn-add:hover { background: var(--accent-h); transform: translateY(-1px); }

    /* ===== 레이아웃 ===== */
    .wrap { max-width: 1440px; margin: 0 auto; padding: 24px 24px 60px; }

    /* ===== 업데이트 배너 ===== */
    .update-bar {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--rs); padding: 10px 16px;
      margin-bottom: 16px; font-size: 13px; color: var(--sub);
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 8px;
    }
    .update-bar .left { display: flex; align-items: center; gap: 8px; }
    .live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 0 3px rgba(34,197,94,.25);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 3px rgba(34,197,94,.25)} 50%{box-shadow:0 0 0 6px rgba(34,197,94,.1)} }
    .live-dot.offline { background: #94a3b8; box-shadow: none; animation: none; }
    .update-bar b { color: var(--text); }
    .refresh-btn {
      background: none; border: 1.5px solid var(--border);
      border-radius: 50px; padding: 4px 12px;
      font-size: 12px; color: var(--sub);
      transition: border-color .2s, color .2s;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ===== 빈 상태 배너 ===== */
    .empty-banner {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--r); padding: 52px 24px;
      text-align: center; color: var(--sub);
      grid-column: 1 / -1;
    }
    .empty-banner .eb-ico { font-size: 52px; margin-bottom: 16px; }
    .empty-banner h3 { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .empty-banner p  { font-size: 13.5px; line-height: 1.7; }

    /* ===== 조선/기계 특별 섹션 ===== */
    .featured {
      background: linear-gradient(135deg,#083f6e 0%,#1a6fc4 55%,#0a4a80 100%);
      border-radius: var(--r); padding: 22px 24px 20px;
      margin-bottom: 22px; color: #fff; position: relative; overflow: hidden;
    }
    .featured::after {
      content:'🚢'; position:absolute; right:-4px; top:50%;
      transform:translateY(-60%); font-size:96px; opacity:.1; pointer-events:none;
    }
    .feat-hdr { display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
    .feat-title { font-size:17px; font-weight:800; }
    .feat-pill {
      background:rgba(255,255,255,.2); border:1px solid rgba(255,255,255,.3);
      padding:3px 11px; border-radius:50px; font-size:11px; font-weight:700;
    }
    .feat-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:10px; }
    .fcard {
      background:rgba(255,255,255,.11); border:1px solid rgba(255,255,255,.18);
      border-radius:10px; padding:13px 15px;
      transition:background .2s, transform .2s; cursor:pointer;
    }
    .fcard:hover { background:rgba(255,255,255,.2); transform:translateY(-2px); }
    .fcard-title { font-size:13.5px; font-weight:700; margin-bottom:5px; line-height:1.4; }
    .fcard-org { font-size:12px; opacity:.75; margin-bottom:10px; }
    .fcard-foot { display:flex; justify-content:space-between; align-items:center; }
    .fcard-dday {
      font-size:11.5px; font-weight:800; padding:2px 9px;
      border-radius:50px; background:rgba(255,255,255,.18);
    }
    .fcard-dday.urgent { background:#ef4444; }
    .fcard-dday.soon { background:#f59e0b; }
    .fcard-bm {
      background:none; border:none; color:rgba(255,255,255,.6);
      font-size:18px; line-height:1; padding:2px;
      transition:color .2s, transform .2s;
    }
    .fcard-bm:hover, .fcard-bm.on { color:#fbbf24; transform:scale(1.2); }
    .src-tag {
      display:inline-block; font-size:10px; font-weight:700;
      padding:1px 7px; border-radius:4px; margin-top:6px;
      background:rgba(255,255,255,.15); color:rgba(255,255,255,.8);
    }

    /* ===== 장학금 특별 섹션 ===== */
    .featured-scholar {
      background: linear-gradient(135deg,#064e3b 0%,#059669 55%,#065f46 100%);
      border-radius: var(--r); padding: 22px 24px 20px;
      margin-bottom: 22px; color: #fff; position: relative; overflow: hidden;
    }
    .featured-scholar::after {
      content:'💰'; position:absolute; right:-4px; top:50%;
      transform:translateY(-60%); font-size:96px; opacity:.1; pointer-events:none;
    }

    /* ===== 통계 ===== */
    .stats { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
    .stat {
      background:var(--surface); border:1.5px solid var(--border);
      border-radius:50px; padding:6px 15px;
      font-size:13px; color:var(--sub);
      display:flex; align-items:center; gap:5px;
    }
    .stat b { color:var(--text); font-weight:700; }

    /* ===== 탭 ===== */
    .tabs-scroll {
      overflow-x:auto; -webkit-overflow-scrolling:touch;
      scrollbar-width:none; margin-bottom:18px;
    }
    .tabs-scroll::-webkit-scrollbar { display:none; }
    .tabs { display:flex; gap:7px; width:max-content; padding-bottom:2px; }
    .tab {
      padding:8px 17px; border:1.5px solid var(--border);
      border-radius:50px; background:var(--surface);
      color:var(--sub); font-size:13.5px; font-weight:600;
      white-space:nowrap; transition:all .18s;
      display:flex; align-items:center; gap:6px;
    }
    .tab:hover { border-color:var(--accent); color:var(--accent); }
    .tab.on { background:var(--accent); border-color:var(--accent); color:#fff; }
    .tab-n {
      font-size:10.5px; font-weight:800; padding:1px 6px;
      border-radius:50px; background:var(--border); color:var(--sub);
    }
    .tab.on .tab-n { background:rgba(255,255,255,.28); color:#fff; }

    /* ===== 툴바 ===== */
    .toolbar {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:15px; gap:10px; flex-wrap:wrap;
    }
    .rc { font-size:13px; color:var(--sub); }
    .toolbar-r { display:flex; align-items:center; gap:10px; }
    .toggle-exp {
      display:flex; align-items:center; gap:6px;
      font-size:13px; color:var(--sub); cursor:pointer; user-select:none;
    }
    .toggle-exp input { cursor:pointer; accent-color:var(--accent); width:15px; height:15px; }
    .sort-sel {
      padding:7px 11px; border:1.5px solid var(--border);
      border-radius:var(--rs); background:var(--surface);
      color:var(--text); font-size:13px; font-family:inherit; outline:none; cursor:pointer;
    }

    /* ===== 카드 그리드 ===== */
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(310px,1fr)); gap:15px; }
    .card {
      background:var(--surface); border:1.5px solid var(--border);
      border-radius:var(--r); padding:18px 18px 14px;
      display:flex; flex-direction:column; gap:9px;
      transition:box-shadow .2s, transform .2s, border-color .2s;
      cursor:pointer;
    }
    .card:hover { box-shadow:var(--sh-lg); transform:translateY(-3px); border-color:var(--accent); }
    .card.urg { border-left:4px solid #dc2626; }
    .card-hdr { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
    .cat-badge { font-size:11px; font-weight:800; padding:3px 10px; border-radius:50px; flex-shrink:0; }
    .bm-btn {
      background:none; border:none; color:var(--sub);
      font-size:20px; line-height:1; flex-shrink:0;
      transition:color .2s, transform .2s;
    }
    .bm-btn:hover { transform:scale(1.2); }
    .bm-btn.on { color:#f59e0b; }
    .card-title { font-size:15px; font-weight:700; line-height:1.4; }
    .card-org { font-size:12.5px; color:var(--sub); }
    .card-desc {
      font-size:12.5px; color:var(--sub); line-height:1.55;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
    }
    .card-tags { display:flex; flex-wrap:wrap; gap:5px; }
    .tag {
      font-size:11px; padding:2px 8px; border-radius:4px;
      background:var(--bg); color:var(--sub); border:1px solid var(--border);
    }

    /* ===== 장학금 자격 뱃지 ===== */
    .eligibility {
      display:flex; flex-wrap:wrap; gap:5px; margin-top:2px;
    }
    .elig-item {
      font-size:11px; padding:2px 8px; border-radius:50px;
      background:#ecfdf5; color:#065f46; border:1px solid #6ee7b7;
      font-weight:600;
    }
    [data-theme="dark"] .elig-item {
      background:#064e3b; color:#6ee7b7; border-color:#065f46;
    }

    .card-foot {
      display:flex; justify-content:space-between; align-items:center;
      padding-top:10px; border-top:1px solid var(--border); margin-top:auto;
    }
    .deadline { font-size:12px; color:var(--sub); }
    .card-src { font-size:11px; color:var(--accent); margin-top:2px; }
    .dday {
      font-size:12px; font-weight:800; padding:3px 10px;
      border-radius:50px; border:1.5px solid var(--border);
      background:var(--bg); color:var(--sub);
    }
    .dday.urgent { background:#fee2e2; color:#dc2626; border-color:#fca5a5; }
    .dday.soon   { background:#fef3c7; color:#d97706; border-color:#fcd34d; }
    .dday.expired { opacity:.5; text-decoration:line-through; }
    [data-theme="dark"] .dday.urgent { background:#450a0a; color:#f87171; border-color:#7f1d1d; }
    [data-theme="dark"] .dday.soon   { background:#451a03; color:#fbbf24; border-color:#78350f; }

    /* ===== 카테고리 뱃지 색상 ===== */
    .cb-ship, .cb-ship_recruit, .cb-ship_contest,
    .cb-ship_academic, .cb-ship_global, .cb-ship_scholar
                 { background:#dbeafe; color:#1d4ed8; }
    .cb-ai       { background:#ede9fe; color:#7c3aed; }
    .cb-media    { background:#fee2e2; color:#dc2626; }
    .cb-global   { background:#d1fae5; color:#059669; }
    .cb-corp     { background:#fef3c7; color:#b45309; }
    /* 장학금 - 녹색 계열 구분 */
    .cb-scholar        { background:#d1fae5; color:#065f46; }
    .cb-scholar_public { background:#cffafe; color:#0e7490; }
    .cb-scholar_corp   { background:#fef3c7; color:#b45309; }
    .cb-scholar_merit  { background:#ede9fe; color:#6d28d9; }
    .cb-scholar_region { background:#fce7f3; color:#be185d; }
    .cb-scholar_univ   { background:#f0fdf4; color:#166534; }
    .cb-activity { background:#fce7f3; color:#be185d; }

    [data-theme="dark"] .cb-ship,
    [data-theme="dark"] .cb-ship_recruit,
    [data-theme="dark"] .cb-ship_contest,
    [data-theme="dark"] .cb-ship_academic,
    [data-theme="dark"] .cb-ship_global,
    [data-theme="dark"] .cb-ship_scholar { background:#1e3a5f; color:#93c5fd; }
    [data-theme="dark"] .cb-ai       { background:#2e1065; color:#c4b5fd; }
    [data-theme="dark"] .cb-media    { background:#450a0a; color:#fca5a5; }
    [data-theme="dark"] .cb-global   { background:#064e3b; color:#6ee7b7; }
    [data-theme="dark"] .cb-corp     { background:#451a03; color:#fcd34d; }
    [data-theme="dark"] .cb-scholar        { background:#064e3b; color:#6ee7b7; }
    [data-theme="dark"] .cb-scholar_public { background:#0c4a6e; color:#7dd3fc; }
    [data-theme="dark"] .cb-scholar_corp   { background:#451a03; color:#fcd34d; }
    [data-theme="dark"] .cb-scholar_merit  { background:#2e1065; color:#c4b5fd; }
    [data-theme="dark"] .cb-scholar_region { background:#500724; color:#f9a8d4; }
    [data-theme="dark"] .cb-scholar_univ   { background:#14532d; color:#86efac; }
    [data-theme="dark"] .cb-activity { background:#500724; color:#f9a8d4; }

    /* ===== 조선/장학금 서브탭 ===== */
    .sub-tab-wrap {
      overflow-x:auto; -webkit-overflow-scrolling:touch;
      scrollbar-width:none; margin:-6px 0 16px;
    }
    .sub-tab-wrap::-webkit-scrollbar { display:none; }
    .sub-tabs { display:flex; gap:6px; width:max-content; }
    .stab {
      padding:5px 14px; border:1.5px solid rgba(37,99,235,.3);
      border-radius:50px; background:transparent;
      color:var(--accent); font-size:12.5px; font-weight:600;
      white-space:nowrap; cursor:pointer; transition:all .18s;
      display:flex; align-items:center; gap:5px;
    }
    .stab:hover { background:rgba(37,99,235,.08); }
    .stab.on { background:rgba(37,99,235,.12); border-color:var(--accent); font-weight:700; }
    .stab-n {
      font-size:10px; font-weight:800; padding:1px 5px;
      border-radius:50px; background:rgba(37,99,235,.15); color:var(--accent);
    }

    /* 장학금 서브탭 - 초록 계열 */
    .scholar-stab {
      border-color:rgba(5,150,105,.3);
      color:#059669;
    }
    .scholar-stab:hover { background:rgba(5,150,105,.08); }
    .scholar-stab.on { background:rgba(5,150,105,.12); border-color:#059669; }
    .scholar-stab .stab-n { background:rgba(5,150,105,.15); color:#059669; }

    /* ===== 로딩 스피너 ===== */
    .loading {
      grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--sub);
    }
    .spinner {
      width:36px; height:36px; border:3.5px solid var(--border);
      border-top-color:var(--accent); border-radius:50%;
      animation:spin .8s linear infinite; margin:0 auto 16px;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ===== 빈 상태 ===== */
    .empty {
      grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--sub);
    }
    .empty-ico { font-size:52px; margin-bottom:14px; }
    .empty h3 { font-size:17px; color:var(--text); margin-bottom:7px; }

    /* ===== 모달 ===== */
    .overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.48); z-index:500;
      display:flex; align-items:center; justify-content:center; padding:16px;
      backdrop-filter:blur(5px);
      opacity:0; visibility:hidden; transition:opacity .25s, visibility .25s;
    }
    .overlay.open { opacity:1; visibility:visible; }
    .modal {
      background:var(--surface); border-radius:var(--r); padding:26px 26px 22px;
      width:100%; max-width:500px; max-height:90vh; overflow-y:auto;
      box-shadow:var(--sh-lg);
      transform:translateY(18px) scale(.98); transition:transform .25s;
    }
    .overlay.open .modal { transform:translateY(0) scale(1); }
    .modal-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:22px; }
    .modal-title { font-size:17px; font-weight:800; }
    .modal-close { background:none; border:none; font-size:22px; color:var(--sub); line-height:1; }
    .modal-close:hover { color:var(--text); }
    .fg { margin-bottom:14px; }
    .fg label { display:block; font-size:12.5px; font-weight:700; margin-bottom:5px; }
    .fg label span { color:#dc2626; }
    .fi, .fs, .ft {
      width:100%; padding:9px 12px; border:1.5px solid var(--border);
      border-radius:var(--rs); background:var(--surface2);
      color:var(--text); font-size:13.5px; font-family:inherit; outline:none;
      transition:border-color .2s;
    }
    .fi:focus, .fs:focus, .ft:focus { border-color:var(--accent); }
    .ft { resize:vertical; min-height:78px; }
    .frow { display:grid; grid-template-columns:1fr 1fr; gap:11px; }
    .btn-sub {
      width:100%; padding:12px; background:var(--accent); color:#fff;
      border:none; border-radius:var(--rs);
      font-size:15px; font-weight:700; font-family:inherit;
      margin-top:6px; transition:background .2s;
    }
    .btn-sub:hover { background:var(--accent-h); }

    /* ===== 토스트 ===== */
    .toast {
      position:fixed; bottom:22px; right:22px;
      background:#1e293b; color:#fff; padding:11px 18px;
      border-radius:var(--rs); font-size:13.5px; z-index:999;
      transform:translateY(70px); opacity:0;
      transition:transform .28s, opacity .28s;
      max-width:280px; box-shadow:0 4px 20px rgba(0,0,0,.3);
    }
    [data-theme="dark"] .toast { background:#f1f5f9; color:#1e293b; }
    .toast.show { transform:translateY(0); opacity:1; }

    /* ===== 반응형 ===== */
    @media (max-width:700px) {
      .hdr { padding:0 14px; gap:10px; }
      .logo .logo-txt { display:none; }
      .wrap { padding:16px 14px 50px; }
      .grid { grid-template-columns:1fr; }
      .feat-grid { grid-template-columns:1fr; }
      .frow { grid-template-columns:1fr; }
      .stats { display:none; }
      .btn-add .add-txt { display:none; }
    }
  </style>
</head>
<body>

<!-- ===== 헤더 ===== -->
<header>
  <div class="hdr">
    <div class="logo">
      <span class="logo-em">🚢</span>
      <span class="logo-txt">내 대시보드</span>
    </div>
    <div class="sw">
      <span class="sw-ico">🔍</span>
      <input id="searchInput" type="text" placeholder="공모전, 장학금, 기업명 검색…" oninput="handleSearch()">
    </div>
    <div class="hdr-r">
      <button class="btn-ico" id="themeBtn" onclick="toggleDark()" title="다크모드">🌙</button>
      <button class="btn-add" onclick="openModal()">
        <span>＋</span><span class="add-txt">공고 추가</span>
      </button>
    </div>
  </div>
</header>

<div class="wrap">

  <!-- 업데이트 상태 바 -->
  <div class="update-bar">
    <div class="left">

<script>
// ════════════════════════════════════════════════════════
// 카테고리 정의
// ════════════════════════════════════════════════════════
const CATS = {
  all:            { label:'전체보기',         icon:'📋' },
  ship:           { label:'조선/기계',        icon:'🚢' },
  ship_recruit:   { label:'채용/인턴십',      icon:'💼' },
  ship_contest:   { label:'공모전/경진',      icon:'🏆' },
  ship_academic:  { label:'학술/논문',        icon:'📖' },
  ship_global:    { label:'해외 인턴십',      icon:'✈️' },
  ship_scholar:   { label:'조선 장학금',      icon:'💰' },
  ai:             { label:'AI/IoT',          icon:'🤖' },
  media:          { label:'영상/콘텐츠',      icon:'🎬' },
  global:         { label:'해외 인턴십',      icon:'✈️' },
  corp:           { label:'대기업 인턴',      icon:'🏢' },
  // 장학금 카테고리
  scholar:        { label:'기타 장학금',      icon:'💰' },
  scholar_public: { label:'국가/공공 장학금', icon:'🏛️' },
  scholar_corp:   { label:'기업/사설 장학금', icon:'🏢' },
  scholar_merit:  { label:'성적우수 장학금',  icon:'📊' },
  scholar_region: { label:'지역 장학금',      icon:'📍' },
  scholar_univ:   { label:'대학외부 장학금',  icon:'🎓' },
  activity:       { label:'대외활동',         icon:'🎯' },
  bookmark:       { label:'즐겨찾기',         icon:'⭐' },
};

const SHIP_SUBS = [
  { key: '',         label: '전체',       icon: '🚢' },
  { key: 'recruit',  label: '채용/인턴',  icon: '💼' },
  { key: 'contest',  label: '공모전',     icon: '🏆' },
  { key: 'academic', label: '학술/논문',  icon: '📖' },
  { key: 'global',   label: '해외인턴',   icon: '✈️' },
  { key: 'scholar',  label: '장학금',     icon: '💰' },
];

const SCHOLAR_SUBS = [
  { key: '',       label: '전체',            icon: '💰' },
  { key: 'public', label: '국가/공공',       icon: '🏛️' },
  { key: 'corp',   label: '기업/사설',       icon: '🏢' },
  { key: 'merit',  label: '성적우수',        icon: '📊' },
  { key: 'region', label: '지역(부산·경남)', icon: '📍' },
  { key: 'univ',   label: '대학 외부',       icon: '🎓' },
];

// 장학금 카테고리 판별 헬퍼
function isScholarCat(cat) {
  return cat === 'scholar' || cat.startsWith('scholar_');
}
function isShipCat(cat) {
  return cat === 'ship' || cat.startsWith('ship_');
}

// ════════════════════════════════════════════════════════
// 상태
// ════════════════════════════════════════════════════════
const S = {
  tab: 'all',
  shipSub: '',
  scholarSub: '',
  query: '',
  liveItems: [],
  custom: JSON.parse(localStorage.getItem('custom') || '[]'),
  bookmarks: new Set(JSON.parse(localStorage.getItem('bms') || '[]')),
};

function allEntries() {
  return [...S.liveItems, ...S.custom];
}

// ════════════════════════════════════════════════════════
// 데이터 로딩
// ════════════════════════════════════════════════════════
async function loadData(force = false) {
  const dot  = document.getElementById('liveDot');
  const info = document.getElementById('updateInfo');
  info.textContent = '데이터 불러오는 중…';

  try {
    const url = force ? `./data.json?t=${Date.now()}` : './data.json';
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();

    const items = (json.items || []);
    S.liveItems = items;

    dot.classList.remove('offline');
    const updated = json.updated ? json.updated.slice(0,16).replace('T',' ') : '?';
    const scholarCount = items.filter(e => isScholarCat(e.cat)).length;
    info.innerHTML = `<b>${items.length}건</b> 수집됨 (장학금 <b>${scholarCount}건</b>) · 마지막 업데이트 <b>${updated}</b>`;

  } catch (e) {
    S.liveItems = [];
    dot.classList.add('offline');
    info.innerHTML = '데이터를 불러오지 못했습니다 · 크롤러 실행 후 새로고침 해주세요';
  }

  render();
}

// ════════════════════════════════════════════════════════
// D-day 계산
// ════════════════════════════════════════════════════════
function dday(dateStr) {
  const now = new Date(); now.setHours(0,0,0,0);
  const d = new Date(dateStr + 'T00:00:00'); d.setHours(0,0,0,0);
  return Math.round((d - now) / 86400000);
}
function ddayLabel(n) {
  if (n < 0) return '마감';
  if (n === 0) return 'D-Day';
  return `D-${n}`;
}
function ddayCls(n) {
  if (n < 0) return 'expired';
  if (n <= 3) return 'urgent';
  if (n <= 7) return 'soon';
  return '';
}
function fmtDate(s) {
  const d = new Date(s + 'T00:00:00');
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

// ════════════════════════════════════════════════════════
// 필터 / 정렬
// ════════════════════════════════════════════════════════
function filtered() {
  let list = allEntries();
  const q = S.query.toLowerCase();
  const showExp = document.getElementById('showExpired')?.checked;

  if (!showExp) {
    list = list.filter(e => dday(e.deadline) >= 0);
  }

  if (S.tab === 'bookmark') {
    list = list.filter(e => S.bookmarks.has(e.id));
  } else if (S.tab === 'ship') {
    list = list.filter(e => isShipCat(e.cat));
    if (S.shipSub) {
      list = list.filter(e => e.cat === 'ship_' + S.shipSub);
    }
  } else if (S.tab === 'scholar') {
    list = list.filter(e => isScholarCat(e.cat));
    if (S.scholarSub) {
      list = list.filter(e => e.cat === 'scholar_' + S.scholarSub);
    }
  } else if (S.tab !== 'all') {
    list = list.filter(e => e.cat === S.tab);
  }

  if (q) {
    list = list.filter(e =>
      e.title.toLowerCase().includes(q) ||
      e.org.toLowerCase().includes(q) ||
      (e.desc||'').toLowerCase().includes(q) ||
      (e.tags||[]).some(t => t.toLowerCase().includes(q))
    );
  }

  const sort = document.getElementById('sortSel')?.value || 'deadline';
  if (sort === 'deadline') {
    list.sort((a,b) => {
      const da = dday(a.deadline), db = dday(b.deadline);
      if (da >= 0 && db < 0) return -1;
      if (da < 0 && db >= 0) return 1;
      return da - db;
    });
  } else {
    list = [...list].reverse();
  }
  return list;
}

// ════════════════════════════════════════════════════════
// 렌더링
// ════════════════════════════════════════════════════════
function render() {
  renderFeatured();
  renderScholarFeatured();
  renderTabs();
  renderShipSubTabs();
  renderScholarSubTabs();
  renderCards();
  renderStats();
}

function renderFeatured() {
  const sec = document.getElementById('featuredSection');
  sec.style.display = (S.tab === 'all' || S.tab === 'ship') ? '' : 'none';

  const shipItems = allEntries()
    .filter(e => isShipCat(e.cat) && dday(e.deadline) >= 0)
    .sort((a,b) => dday(a.deadline) - dday(b.deadline))
    .slice(0, 6);

  document.getElementById('featuredGrid').innerHTML = shipItems.length
    ? shipItems.map(e => _featCard(e)).join('')
    : '<div style="color:rgba(255,255,255,.6);font-size:14px">조선/기계 관련 공고가 없습니다.</div>';
}

function renderScholarFeatured() {
  const sec = document.getElementById('scholarSection');
  sec.style.display = (S.tab === 'all' || S.tab === 'scholar') ? '' : 'none';

  // D-30 이내 장학금
  const scholarItems = allEntries()
    .filter(e => isScholarCat(e.cat) && dday(e.deadline) >= 0 && dday(e.deadline) <= 30)
    .sort((a,b) => dday(a.deadline) - dday(b.deadline))
    .slice(0, 6);

  document.getElementById('scholarGrid').innerHTML = scholarItems.length
    ? scholarItems.map(e => _featCard(e)).join('')
    : '<div style="color:rgba(255,255,255,.6);font-size:14px">D-30 이내 마감 장학금이 없습니다.</div>';
}

function _featCard(e) {
  const n = dday(e.deadline);
  const bm = S.bookmarks.has(e.id);
  const ci = CATS[e.cat] || {};
  return `
    <div class="fcard" onclick="openUrl('${escUrl(e.url)}')">
      <div class="fcard-title">${esc(e.title)}</div>
      <div class="fcard-org">🏢 ${esc(e.org)}</div>
      ${ci.label ? `<div class="src-tag">${ci.icon} ${ci.label}</div>` : ''}
      ${e.src ? `<div class="src-tag">🔗 ${esc(e.src)}</div>` : ''}
      <div class="fcard-foot" style="margin-top:8px">
        <span class="fcard-dday ${ddayCls(n)}">${ddayLabel(n)}</span>
        <button class="fcard-bm ${bm?'on':''}" title="즐겨찾기"
          onclick="event.stopPropagation();toggleBm('${e.id}')">${bm?'★':'☆'}</button>
      </div>
    </div>`;
}

function renderTabs() {
  const showExp = document.getElementById('showExpired')?.checked;
  const all = allEntries().filter(e => showExp || dday(e.deadline) >= 0);
  const cnt = {};
  all.forEach(e => cnt[e.cat] = (cnt[e.cat]||0)+1);

  const shipCnt    = all.filter(e => isShipCat(e.cat)).length;
  const scholarCnt = all.filter(e => isScholarCat(e.cat)).length;

  const defs = [
    ['all',      '📋 전체보기',   all.length],
    ['ship',     '🚢 조선/기계',  shipCnt],
    ['ai',       '🤖 AI/IoT',    cnt.ai||0],
    ['media',    '🎬 영상/콘텐츠', cnt.media||0],
    ['global',   '✈️ 해외인턴',   cnt.global||0],
    ['corp',     '🏢 대기업 인턴', cnt.corp||0],
    ['scholar',  '💰 장학금',     scholarCnt],
    ['activity', '🎯 대외활동',   cnt.activity||0],
    ['bookmark', '⭐ 즐겨찾기',   S.bookmarks.size],
  ];

  document.getElementById('tabs').innerHTML = defs.map(([k,label,n]) =>
    `<button class="tab ${S.tab===k?'on':''}" onclick="setTab('${k}')">
      ${label}<span class="tab-n">${n}</span>
    </button>`
  ).join('');
}

function renderCards() {
  const list = filtered();
  const rc   = document.getElementById('rc');
  const grid = document.getElementById('grid');
  const showExp = document.getElementById('showExpired')?.checked;
  const totalActive = allEntries().filter(e => dday(e.deadline) >= 0).length;
  const expiredCount = allEntries().length - totalActive;

  rc.innerHTML = `총 <b>${list.length}건</b>${!showExp && expiredCount > 0 ? ` (마감 ${expiredCount}건 숨김)` : ''}`;

  if (!list.length) {
    const noLive = S.liveItems.length === 0 && S.custom.length === 0;
    grid.innerHTML = noLive
      ? `<div class="empty-banner">
           <div class="eb-ico">📭</div>
           <h3>현재 수집된 공고가 없습니다</h3>
           <p>크롤러를 실행하거나 <b>＋ 공고 추가</b> 버튼으로 직접 등록하세요.</p>
         </div>`
      : `<div class="empty-banner">
           <div class="eb-ico">🔍</div>
           <h3>검색 결과가 없습니다</h3>
           <p>다른 카테고리를 선택하거나 검색어를 바꿔보세요.</p>
         </div>`;
    return;
  }

  grid.innerHTML = list.map(e => {
    const n = dday(e.deadline);
    const bm = S.bookmarks.has(e.id);
    const ci = CATS[e.cat] || {};
    const urg = n >= 0 && n <= 3;
    const elig = e.eligibility || {};
    const hasElig = elig.grade || elig.gpa;

    return `
      <div class="card ${urg?'urg':''}" onclick="openUrl('${escUrl(e.url)}')">
        <div class="card-hdr">
          <span class="cat-badge cb-${e.cat}">${ci.icon||''} ${ci.label||e.cat}</span>
          <button class="bm-btn ${bm?'on':''}" title="즐겨찾기"
            onclick="event.stopPropagation();toggleBm('${e.id}')">${bm?'★':'☆'}</button>
        </div>
        <div class="card-title">${esc(e.title)}</div>
        <div class="card-org">🏢 ${esc(e.org)}</div>
        ${e.desc ? `<div class="card-desc">${esc(e.desc)}</div>` : ''}
        ${hasElig ? `<div class="eligibility">
          ${elig.grade ? `<span class="elig-item">👤 ${esc(elig.grade)}</span>` : ''}
          ${elig.gpa   ? `<span class="elig-item">📊 학점 ${esc(elig.gpa)}</span>` : ''}
        </div>` : ''}
        ${e.tags?.length ? `<div class="card-tags">${e.tags.map(t=>`<span class="tag">#${esc(t)}</span>`).join('')}</div>` : ''}
        <div class="card-foot">
          <div>
            <div class="deadline">마감 ${fmtDate(e.deadline)}</div>
            ${e.src ? `<div class="card-src">🔗 ${esc(e.src)}</div>` : ''}
          </div>
          <span class="dday ${ddayCls(n)}">${ddayLabel(n)}</span>
        </div>
      </div>`;
  }).join('');
}

function renderStats() {
  const all = allEntries();
  const urgCnt    = all.filter(e => { const n=dday(e.deadline); return n>=0&&n<=3; }).length;
  const activeCnt = all.filter(e => dday(e.deadline) >= 0).length;
  const scholarCnt = all.filter(e => isScholarCat(e.cat) && dday(e.deadline) >= 0).length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat">📋 전체 <b>${all.length}건</b></div>
    <div class="stat">✅ 진행중 <b>${activeCnt}건</b></div>
    <div class="stat">💰 장학금 <b>${scholarCnt}건</b></div>
    <div class="stat">🔴 마감임박(3일) <b>${urgCnt}건</b></div>
    <div class="stat">⭐ 즐겨찾기 <b>${S.bookmarks.size}건</b></div>`;
}

// ════════════════════════════════════════════════════════
// 서브탭 렌더링
// ════════════════════════════════════════════════════════
function renderShipSubTabs() {
  const wrap = document.getElementById('shipSubWrap');
  if (S.tab !== 'ship') { wrap.style.display = 'none'; return; }

  const showExp = document.getElementById('showExpired')?.checked;
  const all = allEntries().filter(e => showExp || dday(e.deadline) >= 0);
  const cnt = {};
  all.forEach(e => {
    if (e.cat === 'ship') { cnt['recruit'] = (cnt['recruit']||0)+1; }
    else if (e.cat.startsWith('ship_')) {
      const sub = e.cat.slice(5);
      cnt[sub] = (cnt[sub]||0)+1;
    }
  });
  const total = all.filter(e => isShipCat(e.cat)).length;
  if (total === 0) { wrap.style.display = 'none'; return; }

  const visibleSubs = SHIP_SUBS.filter(s => s.key === '' || (cnt[s.key]||0) > 0);
  if (visibleSubs.length <= 1) { wrap.style.display = 'none'; return; }

  wrap.style.display = '';
  document.getElementById('shipSubTabs').innerHTML = visibleSubs.map(s => {
    const n = s.key ? (cnt[s.key]||0) : total;
    return `<button class="stab ${S.shipSub===s.key?'on':''}" onclick="setShipSub('${s.key}')">
      ${s.icon} ${s.label}<span class="stab-n">${n}</span>
    </button>`;
  }).join('');
}

function renderScholarSubTabs() {
  const wrap = document.getElementById('scholarSubWrap');
  if (S.tab !== 'scholar') { wrap.style.display = 'none'; return; }

  const showExp = document.getElementById('showExpired')?.checked;
  const all = allEntries().filter(e => showExp || dday(e.deadline) >= 0);
  const cnt = {};
  all.forEach(e => {
    if (isScholarCat(e.cat)) {
      const sub = e.cat === 'scholar' ? '' : e.cat.slice(8); // 'scholar_' = 8 chars
      cnt[sub] = (cnt[sub]||0)+1;
    }
  });
  const total = all.filter(e => isScholarCat(e.cat)).length;
  if (total === 0) { wrap.style.display = 'none'; return; }

  // 데이터 있는 서브탭만 표시
  const visibleSubs = SCHOLAR_SUBS.filter(s => s.key === '' || (cnt[s.key]||0) > 0);
  if (visibleSubs.length <= 1) { wrap.style.display = 'none'; return; }

  wrap.style.display = '';
  document.getElementById('scholarSubTabs').innerHTML = visibleSubs.map(s => {
    const n = s.key ? (cnt[s.key]||0) : total;
    return `<button class="stab scholar-stab ${S.scholarSub===s.key?'on':''}" onclick="setScholarSub('${s.key}')">
      ${s.icon} ${s.label}<span class="stab-n">${n}</span>
    </button>`;
  }).join('');
}

// ════════════════════════════════════════════════════════
// 액션
// ════════════════════════════════════════════════════════
function setTab(k) {
  S.tab = k;
  if (k !== 'ship') S.shipSub = '';
  if (k !== 'scholar') S.scholarSub = '';
  render();
}
function setShipSub(k)    { S.shipSub = k; render(); }
function setScholarSub(k) { S.scholarSub = k; render(); }
function handleSearch()   { S.query = document.getElementById('searchInput').value; renderCards(); }

function toggleBm(id) {
  S.bookmarks.has(id) ? S.bookmarks.delete(id) : S.bookmarks.add(id);
  localStorage.setItem('bms', JSON.stringify([...S.bookmarks]));
  toast(S.bookmarks.has(id) ? '즐겨찾기에 추가했습니다 ⭐' : '즐겨찾기에서 제거했습니다');
  render();
}

function openUrl(url) {
  if (url && url !== '#') window.open(url, '_blank', 'noopener');
}

function toggleDark() {
  const html = document.documentElement;
  const dark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', dark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = dark ? '🌙' : '☀️';
  localStorage.setItem('theme', dark ? 'light' : 'dark');
}

// ===== 모달 =====
function openModal() {
  document.getElementById('modal').classList.add('open');
  document.getElementById('iDeadline').value = new Date().toISOString().slice(0,10);
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

function handleAdd(e) {
  e.preventDefault();
  const tags  = document.getElementById('iTags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const grade = document.getElementById('iGrade').value.trim();
  const gpa   = document.getElementById('iGpa').value.trim();
  const entry = {
    id:    'c' + Date.now(),
    cat:   document.getElementById('iCat').value,
    title: document.getElementById('iTitle').value,
    org:   document.getElementById('iOrg').value,
    deadline: document.getElementById('iDeadline').value,
    url:   document.getElementById('iUrl').value,
    src:   '직접 추가',
    desc:  document.getElementById('iDesc').value,
    tags,
    eligibility: { grade, gpa, note: '' },
  };
  S.custom.push(entry);
  localStorage.setItem('custom', JSON.stringify(S.custom));
  closeModal();
  document.getElementById('addForm').reset();
  toast('공고가 추가되었습니다! 📌');
  render();
}

// ===== 토스트 =====
let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 2600);
}

// ===== 이스케이프 =====
function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escUrl(s) { return String(s||'').replace(/'/g,'%27'); }

// ════════════════════════════════════════════════════════
// 초기화
// ════════════════════════════════════════════════════════
(function init() {
  const t = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn').textContent = t === 'dark' ? '☀️' : '🌙';
  loadData();
})();
</script>
