name: 🔄 공모전 데이터 자동 업데이트

on:
  schedule:
    # 매일 오전 9시 KST (= UTC 00:00)
    - cron: '0 0 * * *'
  # 수동 실행 (GitHub Actions 탭에서 "Run workflow" 버튼)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: crawler/requirements.txt

      - name: 📥 의존성 설치
        run: pip install -r crawler/requirements.txt

      - name: 🕷 크롤러 실행
        # 크롤링이 실패해도 기존 data.json 유지 (continue-on-error)
        continue-on-error: true
        run: python crawler/crawler.py

      - name: 📊 수집 결과 확인
        run: |
          if [ -f data.json ]; then
            echo "✅ data.json 생성됨"
            python -c "
          import json
          with open('data.json') as f:
              d = json.load(f)
          print(f'  총 {d[\"total\"]}건, 업데이트: {d[\"updated\"]}')
          cats = {}
          for item in d['items']:
              cats[item['cat']] = cats.get(item['cat'], 0) + 1
          for k, v in cats.items():
              print(f'  {k}: {v}건')
            "
          else
            echo "⚠ data.json 없음 (크롤링 실패)"
          fi

      - name: 💾 변경사항 커밋 & 푸시
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 스킵"
          else
            git commit -m "🔄 Auto-update $(date '+%Y-%m-%d %H:%M KST')"
            git push
          fi
