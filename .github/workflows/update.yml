name: 🔄 공모전 데이터 자동 업데이트

on:
  schedule:
    # 매일 KST 09:00 (UTC 00:00) — 정각은 혼잡하므로 :15분 오프셋 적용
    - cron: '15 0 * * *'
    # KST 11:00 (UTC 02:00) 백업 — 위 스케줄이 지연되거나 실패할 경우 대비
    - cron: '15 2 * * *'
  workflow_dispatch:  # Actions 탭 "Run workflow" 버튼으로 수동 실행

permissions:
  contents: write

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # 크롤러가 무한 대기하는 상황 방지

    steps:
      - name: 📦 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: crawler/requirements.txt

      - name: 📥 의존성 설치
        run: pip install -r crawler/requirements.txt

      - name: 🕷 크롤러 실행
        continue-on-error: true   # 크롤링 실패해도 기존 data.json 유지
        timeout-minutes: 20       # 크롤러 자체 타임아웃
        run: python crawler/crawler.py

      - name: 📊 수집 결과 확인
        run: |
          if [ -f data.json ]; then
            python -c "
          import json
          from datetime import date
          with open('data.json') as f:
              d = json.load(f)
          print(f'총 {d[\"total\"]}건  |  업데이트: {d[\"updated\"]}')
          cats = {}
          for item in d['items']:
              cats[item['cat']] = cats.get(item['cat'], 0) + 1
          labels = {
            'ship':'조선/기계','ship_recruit':'조선채용','ship_contest':'조선공모전',
            'ship_academic':'조선학술','ship_global':'조선해외인턴','ship_scholar':'조선장학금',
            'ai':'AI/IoT','media':'영상/콘텐츠','global':'해외인턴','corp':'대기업인턴',
            'scholar':'장학금','scholar_public':'국가장학금','scholar_corp':'기업장학금',
            'scholar_merit':'성적우수장학금','scholar_region':'지역장학금','scholar_univ':'대학외부장학금',
            'activity':'대외활동'
          }
          for k, v in sorted(cats.items(), key=lambda x: -x[1]):
              print(f'  {labels.get(k,k)}: {v}건')
          expired = [i for i in d['items'] if date.fromisoformat(i['deadline']) < date.today()]
          if expired:
              print(f'⚠ 마감 지난 항목 {len(expired)}건 포함됨')
          else:
              print('✅ 전체 항목 마감일 정상')
            "
          else
            echo "⚠ data.json 없음 — 크롤링 완전 실패"
          fi

      - name: 💾 변경사항 커밋 & 푸시
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 스킵"
          else
            COUNT=$(python -c "import json; d=json.load(open('data.json')); print(d['total'])")
            git commit -m "🔄 Auto-update $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST') — ${COUNT}건"
            git push
          fi
